<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .plus { color: green; }
    .minus { color: red; }
    .delete-btn { margin-left: 10px; color: red; cursor: pointer; }
  </style>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <h2>Expense Tracker</h2>

  <h4>Your Balance</h4>
  <h1 id="balance">$0.00</h1>

  <div>
    <h4>Income</h4>
    <p id="money-plus" class="plus">+$0.00</p>
    <h4>Expense</h4>
    <p id="money-minus" class="minus">-$0.00</p>
  </div>

  <h3>Add New Transaction</h3>
  <form id="form">
    <input type="text" id="text" placeholder="Transaction name" required>
    <input type="number" id="amount" placeholder="Amount" required>
    <label><input type="radio" name="transactionType" value="income" checked> Income</label>
    <label><input type="radio" name="transactionType" value="expense"> Expense</label>
    <button type="submit">Add Transaction</button>
  </form>

  <h3>History</h3>
  <ul id="list"></ul>

  <script src="app.js"></script>
</body>
</html>
